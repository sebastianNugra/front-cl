<div class="historial-container">
    <h2 class="page-title" animate.enter="fade-in-up">Historial de Operaciones</h2>

    <div class="table-wrapper" animate.enter="fade-in-up">
        <table mat-table [dataSource]="data()" class="full-width">
            <!-- Operación -->
            <ng-container matColumnDef="operacion">
                <th mat-header-cell *matHeaderCellDef>Operación</th>
                <td mat-cell *matCellDef="let row">{{ getOperacionTexto(row) }}</td>
            </ng-container>

            <!-- Resultado -->
            <ng-container matColumnDef="resultado">
                <th mat-header-cell *matHeaderCellDef>Resultado</th>
                <td mat-cell *matCellDef="let row" class="resultado">{{ row.resultado }}</td>
            </ng-container>

            <!-- Fecha -->
            <ng-container matColumnDef="fecha">
                <th mat-header-cell *matHeaderCellDef>Fecha</th>
                <td mat-cell *matCellDef="let row">{{ row.fecha }}</td>
            </ng-container>

            <!-- Acciones -->
            <ng-container matColumnDef="acciones">
                <th mat-header-cell *matHeaderCellDef>Acciones</th>
                <td mat-cell *matCellDef="let row">
                    <button mat-icon-button (click)="verDetalle(row.id)" matTooltip="Ver detalle">
                        <mat-icon>visibility</mat-icon>
                    </button>
                    <button mat-icon-button color="warn" (click)="confirmarEliminar(row)" matTooltip="Eliminar">
                        <mat-icon>delete</mat-icon>
                    </button>
                </td>
            </ng-container>

            <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
            <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
        </table>

        <mat-paginator [length]="totalElements()" [pageSize]="pageSize()" [pageIndex]="pageIndex()"
            [pageSizeOptions]="[5, 10, 25]" (page)="onPageChange($event)" showFirstLastButtons />
    </div>
</div>
