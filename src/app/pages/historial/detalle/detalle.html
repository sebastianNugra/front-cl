<div class="detalle-container">
    @if (cargando()) {
    <div class="loading">
        <mat-icon class="spinning">sync</mat-icon>
    </div>
    } @else if (operacion(); as op) {
    <mat-card class="detalle-card" animate.enter="fade-in-up">
        <mat-card-header>
            <mat-card-title>Detalle de Operación</mat-card-title>
            <mat-card-subtitle>{{ op.fecha }}</mat-card-subtitle>
        </mat-card-header>
        <mat-card-content>
            <div class="operation-display">
                <span class="operand">{{ op.valor1 }}</span>
                <span class="operator">{{ getOperadorSymbol(op.tipo) }}</span>
                <span class="operand">{{ op.valor2 }}</span>
                <span class="equals">=</span>
                <span class="result">{{ op.resultado }}</span>
            </div>
        </mat-card-content>
        <mat-card-actions>
            <button mat-stroked-button (click)="volver()">
                <mat-icon>arrow_back</mat-icon>
                Volver
            </button>
        </mat-card-actions>
    </mat-card>
    }
</div>
